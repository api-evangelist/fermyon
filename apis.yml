aid: fermyon
name: Fermyon
description: >-
  Fermyon Wasm Functions is a multi-tenant, hosted, globally distributed engine
  for serverless functions running on Akamai Cloud, the most distributed cloud
  network. Fermyon is the company behind the Spin Framework and SpinKube,
  providing tools and runtimes for building and operating WebAssembly-based
  serverless applications.
