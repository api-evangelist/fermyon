      parameters:
      - name: Api-Version
        in: header
        description: The requested API version
        schema:
          type: string
          default: '1.0'
      responses:
        '200':
          description: Success
  /api/oci/{name}/manifests/{reference}:
    head:
      tags:
      - oci
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
